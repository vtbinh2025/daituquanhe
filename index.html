<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Bài tập Đại từ Quan hệ - Pro Dashboard</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --sidebar: #1e293b;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-dark: #334155;
            --card: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Tránh cuộn trang chính */
        }

        .app-container {
            width: 95vw;
            max-width: 1600px;
            height: 90vh;
            background: var(--card);
            border-radius: 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Sidebar bên trái */
        .sidebar {
            background: var(--sidebar);
            color: white;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar h2 { font-size: 1.8rem; margin: 0 0 10px 0; color: var(--accent); }
        
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border: 8px solid var(--accent);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
        }

        /* Nội dung bài làm */
        .content {
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header-info {
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .q-batch {
            display: grid;
            gap: 20px;
        }

        .q-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .q-card:hover { border-color: var(--accent); transform: translateX(5px); }

        .q-text { font-weight: 600; font-size: 1.1rem; color: var(--text-dark); margin-bottom: 12px; display: block; }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus { outline: none; border-color: var(--accent); background: white; }

        .feedback { font-size: 0.9rem; margin-top: 8px; font-weight: bold; display: none; }

        /* Nút bấm */
        .actions {
            margin-top: auto;
            padding-top: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-check { background: var(--success); color: white; flex: 2; }
        .btn-next { background: var(--accent); color: white; flex: 1; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

        /* Progress bar */
        .progress-container { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div>
            <h2>ENGLISH QUIZ</h2>
            <p style="opacity: 0.7;">Chuyên đề: Relative Clauses</p>
            
            <div class="stat-box" style="margin-top: 40px;">
                <span style="font-size: 0.8rem; text-transform: uppercase;">Tiến độ hoàn thành</span>
                <div class="progress-container"><div id="progressFill" class="progress-fill"></div></div>
                <p id="progressText" style="margin: 10px 0 0 0; font-weight: bold;">Câu 1 - 5 / 15</p>
            </div>
        </div>

        <div class="score-circle">
            <span style="font-size: 0.8rem; opacity: 0.8;">TỶ LỆ ĐÚNG</span>
            <span id="percentDisplay" style="font-size: 2.5rem; font-weight: 800;">0%</span>
        </div>

        <p style="font-size: 0.8rem; text-align: center; opacity: 0.5;">Tối ưu cho màn hình 1920x1080 (125%)</p>
    </div>

    <div class="content">
        <div class="header-info">
            <h1 style="margin: 0; color: var(--text-dark);">Nối câu sử dụng Đại từ quan hệ</h1>
            <p style="color: #64748b;">Dùng <b>Who, Which, That, Whose, Whom</b>. Chấp nhận 'that' cho mệnh đề xác định.</p>
        </div>

        <div id="quizBox" class="q-batch">
            </div>

        <div class="actions">
            <button class="btn-check" onclick="gradeBatch()">KIỂM TRA ĐÁP ÁN</button>
            <button id="nextBtn" class="btn-next" onclick="loadNextBatch()" disabled>TIẾP THEO ➔</button>
        </div>
    </div>
</div>

<script>
    const database = [
        { q1: "The man is my uncle.", q2: "He is standing near the door.", ans: "The man who is standing near the door is my uncle", alt: "The man that is standing near the door is my uncle", w: 1 },
        { q1: "I know the girl.", q2: "She won the first prize.", ans: "I know the girl who won the first prize", alt: "I know the girl that won the first prize", w: 1 },
        { q1: "The students are very friendly.", q2: "They live in the dormitory.", ans: "The students who live in the dormitory are very friendly", alt: "The students that live in the dormitory are very friendly", w: 2 },
        { q1: "The book is very interesting.", q2: "I bought it yesterday.", ans: "The book which I bought yesterday is very interesting", alt: "The book that I bought yesterday is very interesting", w: 2 },
        { q1: "The car is expensive.", q2: "It was made in Japan.", ans: "The car which was made in Japan is expensive", alt: "The car that was made in Japan is expensive", w: 1 },
        
        { q1: "The boy is crying.", q2: "His bicycle was stolen.", ans: "The boy whose bicycle was stolen is crying", w: 3 },
        { q1: "I met a woman.", q2: "Her son is a famous singer.", ans: "I met a woman whose son is a famous singer", w: 3 },
        { q1: "The man is a doctor.", q2: "You met him at the party.", ans: "The man whom you met at the party is a doctor", alt: "The man that you met at the party is a doctor", w: 3 },
        { q1: "The laptop is new.", q2: "I bought it last week.", ans: "The laptop which I bought last week is new", alt: "The laptop that I bought last week is new", w: 2 },
        { q1: "The girl is my classmate.", q2: "I lent my book to her.", ans: "The girl whom I lent my book to is my classmate", alt: "The girl that I lent my book to is my classmate", w: 3 },

        { q1: "The doctor is very kind.", q2: "We visited him yesterday.", ans: "The doctor whom we visited yesterday is very kind", alt: "The doctor that we visited yesterday is very kind", w: 2 },
        { q1: "The house is big.", q2: "Its windows are broken.", ans: "The house whose windows are broken is big", w: 3 },
        { q1: "The lady is my teacher.", q2: "She is wearing a red dress.", ans: "The lady who is wearing a red dress is my teacher", alt: "The lady that is wearing a red dress is my teacher", w: 1 },
        { q1: "The phone is broken.", q2: "I dropped it this morning.", ans: "The phone which I dropped this morning is broken", alt: "The phone that I dropped this morning is broken", w: 2 },
        { q1: "That is the man.", q2: "I told you about him.", ans: "That is the man whom I told you about", alt: "That is the man that I told you about", w: 3 }
    ];

    let currentBatchIndex = 0;
    const batchSize = 5;
    let earnedWeight = 0;
    const totalPossibleWeight = database.reduce((s, q) => s + q.w, 0);

    function render() {
        const quizBox = document.getElementById('quizBox');
        quizBox.innerHTML = '';
        const start = currentBatchIndex * batchSize;
        const end = Math.min(start + batchSize, database.length);
        const batch = database.slice(start, end);

        batch.forEach((item, i) => {
            const globalIndex = start + i;
            quizBox.innerHTML += `
                <div class="q-card">
                    <span class="q-text">Câu ${globalIndex + 1}: ${item.q1} ${item.q2}</span>
                    <input type="text" id="in-${globalIndex}" placeholder="Viết lại câu...">
                    <div id="fb-${globalIndex}" class="feedback"></div>
                </div>
            `;
        });

        // Update Progress
        document.getElementById('progressText').innerText = `Câu ${start + 1} - ${end} / ${database.length}`;
        document.getElementById('progressFill').style.width = `${(end / database.length) * 100}%`;
        document.getElementById('nextBtn').disabled = true;
    }

    function normalize(s) { return s.toLowerCase().trim().replace(/[.!?]$/, "").replace(/\s+/g, ' '); }

    function gradeBatch() {
        const start = currentBatchIndex * batchSize;
        const end = Math.min(start + batchSize, database.length);
        
        for (let i = start; i < end; i++) {
            const input = document.getElementById(`in-${i}`);
            const fb = document.getElementById(`fb-${i}`);
            const val = normalize(input.value);
            const item = database[i];

            if (val === normalize(item.ans) || (item.alt && val === normalize(item.alt))) {
                fb.innerText = "✓ Chính xác!";
                fb.style.color = "var(--success)";
                earnedWeight += item.w;
            } else {
                fb.innerText = `✗ Đáp án mẫu: ${item.ans}`;
                fb.style.color = "var(--danger)";
            }
            fb.style.display = "block";
            input.disabled = true;
        }

        const percent = Math.round((earnedWeight / totalPossibleWeight) * 100);
        document.getElementById('percentDisplay').innerText = percent + "%";
        document.getElementById('nextBtn').disabled = false;
    }

    function loadNextBatch() {
        if ((currentBatchIndex + 1) * batchSize < database.length) {
            currentBatchIndex++;
            render();
        } else {
            alert("Chúc mừng! Bạn đã hoàn thành toàn bộ bài tập.");
        }
    }

    render();
</script>
</body>
</html>
